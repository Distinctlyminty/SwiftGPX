name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  macos:
    name: macOS 26 / Swift 6
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
      - name: Build
        run: swift build -Xswiftc -warnings-as-errors
      - name: Test
        run: swift test --enable-code-coverage

  linux:
    name: Linux / Swift 6
    runs-on: ubuntu-latest
    container: swift:6.0
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build -Xswiftc -warnings-as-errors
      - name: Test
        run: swift test
